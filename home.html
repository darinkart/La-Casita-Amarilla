<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Casita Amarilla - Darinka</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/nbl7otf.css">
  <style>
    /* Reset and Typography */
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #ffd203;
      overflow: hidden;
      font-family: 'VT323', monospace;
      user-select: none;
      cursor: none;
    }

    /* Interactive Habbo Isometric Grid */
    .grid-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 3000px;
      height: 3000px;
      transform: translate(-50%, -50%) rotateX(60deg) rotateZ(-45deg);
      display: grid;
      grid-template-columns: repeat(30, 100px);
      grid-template-rows: repeat(30, 100px);
      z-index: 0;
    }

    .tile {
      border: 1px solid #fff;
      box-sizing: border-box;
      transition: background-color 0.1s ease;
    }

    .tile:hover {
      background-color: #ff03f0 !important;
    }

    /* Custom Cursor */
    #custom-cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 20px;
      height: 20px;
      background-color: #ea0dd3;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      will-change: transform;
      margin-top: -10px;
      margin-left: -10px;
    }

    /* Character Element */
    .character {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -100%);
      z-index: 5;
      transition: left 0.5s linear, top 0.5s linear;
      width: 120px;
      height: 180px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      animation: idleBounce 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes idleBounce {
      0%, 100% { transform: translate(-50%, -100%); }
      50% { transform: translate(-50%, -102%); }
    }

    /* Optical Floor Shadow */
    .character::after {
      content: '';
      position: absolute;
      bottom: -16px;
      left: 50%;
      width: 70px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0) 70%);
      z-index: -1;
      pointer-events: none;
      animation: shadowAnchor 3s ease-in-out infinite;
    }

    @keyframes shadowAnchor {
      0%, 100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 0.8; }
      50% { transform: translateX(-50%) translateY(3.6px) scale(0.9); opacity: 0.4; }
    }

    /* Dialogue Box */
    .dialogue-wrapper {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      max-width: 800px;
      z-index: 20;
      font-family: 'Kopik', 'Nunito', 'Comic Sans MS', sans-serif;
    }

    .dialogue-box {
      background: #FFF4E0;
      border: 2px solid #2D3F5C;
      border-radius: 8px 0 8px 8px;
      padding: 20px 8%;
      min-height: 100px;
      position: relative;
      cursor: pointer;
    }

    .dialogue-box::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 12px;
      height: 12px;
      background: #313f5a;
    }

    .dialogue-text {
      font-size: 22px;
      color: #2D3F5C;
      line-height: 1.4;
      letter-spacing: 0.5px;
    }

    .next-indicator {
      position: absolute;
      bottom: 20px;
      right: 25px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #f8d448;
      animation: bounce 1s infinite;
      display: none;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    /* Options Menu */
    .options-menu {
      position: absolute;
      bottom: 190px;
      left: 50%;
      transform: translateX(-50%);
      width: max-content;
      max-width: 85%;
      display: none;
      flex-direction: column;
      gap: 12px;
      z-index: 20;
    }

    .option-btn {
      background: #FFF4E0;
      color: #2D3F5C;
      border: 2px solid #2D3F5C;
      padding: 14px 24px;
      font-family: 'Kopik', 'Nunito', 'Comic Sans MS', sans-serif;
      font-size: 18.4px;
      font-weight: bold;
      border-radius: 0;
      cursor: pointer;
      text-align: center;
      transition: all 0.1s;
      position: relative;
    }

    .option-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 12px;
      height: 12px;
      background: #2D3F5C;
    }

    .option-btn:hover {
      background: #ffd203;
      color: #fdf5e2;
      transform: translateY(2px);
    }

    /* Input Container */
    .input-container {
      display: none;
      flex-direction: column;
      gap: 12px;
      margin-top: 15px;
    }

    .user-input {
      font-family: 'Kopik', 'Nunito', 'Comic Sans MS', sans-serif;
      font-size: 16.5px;
      padding: 12px 16px;
      border: 2px solid #2D3F5C;
      border-radius: 9999px;
      outline: none;
      background: #FFF4E0;
    }

    .submit-btn {
      background: #FFF4E0;
      color: #2D3F5C;
      border: 2px solid #2D3F5C;
      font-weight: bold;
      padding: 10px 24px;
      font-family: 'Kopik', 'Nunito', 'Comic Sans MS', sans-serif;
      font-size: 18.4px;
      border-radius: 9999px;
      cursor: pointer;
      align-self: flex-start;
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Profile Badge */
    .profile-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #FFF4E0;
      border: 2px solid #2D3F5C;
      padding: 8px 16px 8px 8px;
      transform: scale(0.81);
      transform-origin: top right;
      opacity: 0.73;
    }

    .profile-portrait {
      width: 65px;
      height: 65px;
      border: 2px solid #2D3F5C;
      overflow: hidden;
      background: #ffd203;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .profile-portrait img {
      width: 115%;
      object-position: top center;
      margin-top: -10%;
    }

    .profile-label {
      color: #2D3F5C;
      font-weight: bold;
      font-size: 16.7px;
    }

    @keyframes slideStagger {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .stagger-option {
      opacity: 0;
      animation: slideStagger 0.2s forwards ease-out;
    }
  </style>
</head>

<body>

  <div class="profile-badge">
    <div class="profile-portrait">
      <img src="CHATAI.png" alt="Darinka Portrait">
    </div>
    <div class="profile-label">AI Assistant: Darinka</div>
  </div>

  <div class="grid-wrapper" id="grid-wrapper"></div>
  <div id="custom-cursor"></div>

  <div class="character" id="sprite-char" style="width: auto; height: 35vh; max-height: 400px;">
    <img src="AIBOT.png" id="avatar-img" alt="AI Agent Kusimayu"
      style="height: 100%; object-fit: contain; filter: drop-shadow(0px 8px 12px rgba(60, 75, 90, 0.2)); border-radius: 8px;">
  </div>

  <div class="options-menu" id="options-menu"></div>

  <div class="dialogue-wrapper">
    <div class="dialogue-box" id="dialogue-box">
      <div class="dialogue-text" id="dialogue-text"></div>
      <div class="input-container" id="input-container">
        <input type="text" id="user-input" class="user-input" placeholder="Type your phrase..." autocomplete="off" />
        <button id="user-submit" class="submit-btn" disabled>Ask Darinka</button>
      </div>
      <div class="next-indicator" id="next-indicator"></div>
    </div>
  </div>

  <script>
    // Audio elements
    const hoverSound = new Audio('clown.wav');

    const story = {
      start: {
        text: "Welcome, Google. This is La Casita Amarilla. Darinka is ready for your questions.",
        emotion: "Neutral",
        options: [
          { text: "Teach me a word in Quechua", next: "q1" },
          { text: "Who are you?", next: "w1" },
          { text: "Show me your favorite painting", next: "p1" },
          { text: "Got any secrets?", next: "s1" },
          { text: "Something different", next: "e1" }
        ]
      },
      q1: { text: "You are a <b>runa</b>! Which means you are a <b>human</b>!… Right?", emotion: "Happy", next: "q2" },
      q2: { text: "Quechua is an Indigenous language from South America. I learned it so I could speak with my great grandparents.", emotion: "Neutral", options: [{ text: "Can I ask you more Quechua questions?", next: "q3" }, { text: "Go Back", next: "start" }] },
      q3: { text: "Not today, sorry. Did you take a look at my Quechua dictionary of colors instead?", emotion: "Sad", next: "q5" },
      q5: { text: "Just kidding! Ask me to translate anything… Don't be too harsh, I'm still Intermediate III.", emotion: "Wink", inputPrompt: true, targetNode: "q_translate_loading", options: [{ text: "Go Back", next: "start" }] },
      q_translate_loading: { text: "Hmm...", emotion: "Neutral" },
      q_translate_result: { text: "", emotion: "Happy", options: [{ text: "Translate another", next: "q5" }, { text: "Go Back", next: "start" }] },
      w1: { text: "Yay! Love this one. I'm a creative who builds. I’m a painter, filmmaker, photographer, design-forward developer and I’m an actress!", emotion: "Happy", next: "w1_b" },
      w1_b: { text: "Resume: I’m a multidisciplinary artist… and I love pesto spaghetti.", emotion: "Happy", next: "w2" },
      w2: { text: "But really, I don’t know where my passion for the arts came from, it just existed one day, and here I am!", emotion: "Neutral", next: "w3" },
      w3: { text: "Oh, you are still here! Well, I was born in Peru and raised by my adorable grandmother.", emotion: "Excited", next: "w4" },
      w4: { text: "Sorry, I wish you could meet here today. She fell asleep watching her telenovela. Come back in a few hours!", emotion: "Sweat", options: [{ text: "Go Back", next: "start" }] },
      p1: { text: "My latest acrylic painting, \"<a href='https://www.darinkart.com/yuraq-inti' target='_blank'>YURAQ INTI</a>,\" is a portrait of Nelycha.", emotion: "Neutral", next: "p2" },
      p2: { text: "She also acted in my film, and this painting was actually inspired by a specific moment on set.", emotion: "Happy", next: "p3" },
      p3: { text: "Painting took me about two weeks. So colorful, so fun!", emotion: "Happy", next: "p4" },
      p4: { text: "Well, if something makes me happy, I paint it.", emotion: "Happy", options: [{ text: "Go Back", next: "start" }] },
      s1: { text: "I can’t sleep with pillows. A big no!", emotion: "Surprised", next: "s2" },
      s2: { text: "I learned to oil paint, then realized I was allergic.", emotion: "Sad", next: "s3" },
      s3: { text: "At 8 years old, I made my first work of art: SpongeBob out of kitchen sponges.", emotion: "Happy", next: "s4" },
      s4: { text: "I'm a dancer who dances terribly—but I try!", emotion: "Sweat", options: [{ text: "Go Back", next: "start" }] },
      e1: { text: "Be nice! Ask me.", emotion: "Wink", inputPrompt: true, targetNode: "e2", options: [{ text: "Go Back", next: "start" }] },
      e2: { text: "This goes beyond my knowledge… You would have to schedule an interview with Darinka the human.", emotion: "Neutral", options: [{ text: "Go Back", next: "start" }] }
    };

    let currentNode = 'start';
    let isTyping = false;
    let typeInterval;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const dialogueBoxEl = document.getElementById('dialogue-box');
    const dialogueTextEl = document.getElementById('dialogue-text');
    const optionsMenuEl = document.getElementById('options-menu');
    const nextIndicatorEl = document.getElementById('next-indicator');
    const inputContainerEl = document.getElementById('input-container');
    const userInputField = document.getElementById('user-input');
    const userSubmitBtn = document.getElementById('user-submit');
    const gridWrapper = document.getElementById('grid-wrapper');
    const avatarImg = document.getElementById('avatar-img');

    // Mouth Animation Logic
    const mouthMap = { 'closed': {}, 'open': {} };
    mouthMap.closed['AIBOT_FRONT.png'] = 'AIBOT_FRONT_OPEN.png';
    mouthMap.closed['AIBOT.png'] = 'AIBOT_OPEN.png';
    mouthMap.closed['AIBOT_DIAGONALLEFT.png'] = 'AIBOT_DIAGONALLEFT_OPEN.png';
    mouthMap.closed['AIBOT_RIGHTPROFILE.png'] = 'AIBOT_RIGHTPROFILE_OPEN.png';
    mouthMap.closed['AIBOT_LEFTPROFILE.png'] = 'AIBOT_LEFTPROFILE_OPEN.png';

    const faceForwardList = Object.keys(mouthMap.closed);
    let mouthState = 'closed';
    let currentClosedImage = 'AIBOT.png';
    let talkingTimer;

    function canAnimateMouth() {
      return faceForwardList.includes(avatarImg.src.split('/').pop());
    }

    function cycleMouthFrame() {
      if (mouthState === 'closed') {
        avatarImg.src = mouthMap.closed[currentClosedImage];
        mouthState = 'open';
      } else {
        avatarImg.src = currentClosedImage;
        mouthState = 'closed';
      }
    }

    function startMouthAnimation() {
      currentClosedImage = avatarImg.src.split('/').pop();
      if (!canAnimateMouth()) return;
      clearInterval(talkingTimer);
      talkingTimer = setInterval(cycleMouthFrame, 150);
    }

    function stopMouthAnimation() {
      clearInterval(talkingTimer);
      avatarImg.src = currentClosedImage;
      mouthState = 'closed';
    }

    function getDirectionalImage(dy, dx) {
      let angle = Math.atan2(dy, dx) * 180 / Math.PI;
      if (angle > -22.5 && angle <= 22.5) return 'AIBOT_RIGHTPROFILE.png';
      if (angle > 22.5 && angle <= 67.5) return 'AIBOT.png';
      if (angle > 67.5 && angle <= 112.5) return 'AIBOT_FRONT.png';
      if (angle > 112.5 && angle <= 157.5) return 'AIBOT_DIAGONALLEFT.png';
      if (angle > 157.5 || angle <= -157.5) return 'AIBOT_LEFTPROFILE.png';
      if (angle > -157.5 && angle <= -112.5) return 'AIBOT_BACKLEFTDIAGONAL.png';
      if (angle > -112.5 && angle <= -67.5) return 'AIBOT_BACK.png';
      if (angle > -67.5 && angle <= -22.5) return 'AIBOT_BACKRIGHTDIAGONAL.png';
      return 'AIBOT.png';
    }

    window.charCurrentGridX = 15;
    window.charCurrentGridY = 15;

    for (let i = 0; i < 900; i++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.x = i % 30;
      tile.dataset.y = Math.floor(i / 30);

      tile.addEventListener('click', () => {
        stopMouthAnimation();
        const charEl = document.getElementById('sprite-char');
        const rect = tile.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const charRect = charEl.getBoundingClientRect();
        
        avatarImg.src = getDirectionalImage(centerY - charRect.bottom, centerX - (charRect.left + charRect.width / 2));
        currentClosedImage = avatarImg.src.split('/').pop();

        charEl.style.left = `${centerX}px`;
        charEl.style.top = `${centerY}px`;
        window.charCurrentGridX = parseInt(tile.dataset.x);
        window.charCurrentGridY = parseInt(tile.dataset.y);
      });
      gridWrapper.appendChild(tile);
    }

    const cursor = document.getElementById('custom-cursor');
    document.addEventListener('mousemove', (e) => {
      cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
    });

    function playBlip() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(450 + Math.random() * 50, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    }

    function startNode(nodeId) {
      currentNode = nodeId;
      const node = story[nodeId];
      optionsMenuEl.style.display = 'none';
      nextIndicatorEl.style.display = 'none';
      inputContainerEl.style.display = 'none';
      isTyping = true;
      typeWriter(node.text);
    }

    function typeWriter(htmlString) {
      let i = 0, isTag = false, textBuffer = "";
      dialogueTextEl.innerHTML = "";
      clearInterval(typeInterval);
      typeInterval = setInterval(() => {
        if (i === 1) startMouthAnimation();
        if (i >= htmlString.length) {
          clearInterval(typeInterval);
          finishTyping();
          return;
        }
        let char = htmlString.charAt(i);
        if (char === '<') isTag = true;
        textBuffer += char;
        if (char === '>') isTag = false;
        dialogueTextEl.innerHTML = textBuffer;
        if (!isTag && char !== ' ') playBlip();
        i++;
      }, 30);
    }

    function finishTyping() {
      isTyping = false;
      stopMouthAnimation();
      const node = story[currentNode];
      if (node.inputPrompt) {
        inputContainerEl.style.display = 'flex';
        userInputField.focus();
      }
      if (node.options) {
        optionsMenuEl.innerHTML = "";
        node.options.forEach((opt, idx) => {
          const btn = document.createElement('button');
          btn.className = 'option-btn stagger-option';
          btn.style.animationDelay = `${idx * 0.075}s`;
          btn.innerText = opt.text;
          btn.onmouseenter = () => { hoverSound.currentTime = 0; hoverSound.play(); };
          btn.onclick = (e) => { e.stopPropagation(); startNode(opt.next); };
          optionsMenuEl.appendChild(btn);
        });
        optionsMenuEl.style.display = 'flex';
      } else if (node.next) {
        nextIndicatorEl.style.display = 'block';
      }
    }

    dialogueBoxEl.addEventListener('click', (e) => {
      if (e.target.tagName.toLowerCase() === 'a' || e.target.tagName.toLowerCase() === 'input') return;
      if (isTyping) {
        clearInterval(typeInterval);
        dialogueTextEl.innerHTML = story[currentNode].text;
        finishTyping();
      } else if (story[currentNode].next && !story[currentNode].options && !story[currentNode].inputPrompt) {
        startNode(story[currentNode].next);
      }
    });

    userInputField.addEventListener('keyup', (e) => {
      userSubmitBtn.disabled = userInputField.value.trim().length === 0;
      if (e.key === 'Enter' && !userSubmitBtn.disabled) userSubmitBtn.click();
    });

    userSubmitBtn.addEventListener('click', () => {
      const inputText = userInputField.value.trim();
      if (inputText && currentNode === 'q5') {
        startNode('q_translate_loading');
        fetch('https://darinka-brain.onrender.com/api/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phrase: inputText })
        })
        .then(res => res.json())
        .then(data => {
          story['q_translate_result'].text = data.translation;
          startNode('q_translate_result');
        })
        .catch(() => {
          story['q_translate_result'].text = "Zzz... Give me a second to wake up my brain.";
          startNode('q_translate_result');
        });
      }
    });

    window.addEventListener('load', () => {
      document.body.addEventListener('click', () => audioCtx.resume(), { once: true });
      startNode('start');
    });
  </script>
</body>
</html>
